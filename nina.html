<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Nina FOK</title>

  <style>
    :root {
      --black: #030304;
      --line: rgba(255, 255, 255, 0.16);
      --soft-line: rgba(255, 255, 255, 0.07);
      --text: rgba(255, 255, 255, 0.94);
      --muted: rgba(255, 255, 255, 0.42);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: var(--black);
      overflow: hidden;
      color: var(--text);
      font-family:
        "Helvetica Neue",
        Helvetica,
        Arial,
        sans-serif;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(
          circle at 50% 40%,
          rgba(70, 82, 110, 0.08),
          transparent 42%
        ),
        #030304;
    }

    .portal {
      position: relative;
      width: calc(100vw - 80px);
      height: calc(100vh - 80px);
      max-width: 1680px;

      background: #050506;

      border: 1px solid var(--line);

      box-shadow:
        0 0 0 1px rgba(0, 0, 0, 0.8),
        0 40px 120px rgba(0, 0, 0, 0.8),
        0 0 100px rgba(65, 80, 120, 0.035);

      overflow: hidden;
    }

    .portal::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 8;
      pointer-events: none;

      background:
        linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.015),
          transparent 16%
        );

      box-shadow:
        inset 0 0 90px rgba(0, 0, 0, 0.8);
    }

    .portal::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 9;
      pointer-events: none;

      opacity: 0.12;

      background-image:
        repeating-linear-gradient(
          0deg,
          transparent,
          transparent 3px,
          rgba(255, 255, 255, 0.012) 4px
        );
    }

    .hud {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;

      height: 48px;

      display: flex;
      align-items: center;
      justify-content: space-between;

      padding: 0 18px;

      z-index: 20;

      border-bottom: 1px solid var(--soft-line);

      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;

      color: var(--muted);

      pointer-events: none;
    }

    .hud-left {
      color: rgba(255, 255, 255, 0.7);
    }

    .status {
      display: flex;
      align-items: center;
      gap: 9px;
    }

    .status-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.75);

      box-shadow:
        0 0 8px rgba(255, 255, 255, 0.35);
    }

    .viewport {
      position: absolute;
      inset: 49px 0 0 0;
      overflow: hidden;
      background: #000;
    }

    tavus-embed {
      position: absolute;
      inset: 0;

      width: 100%;
      height: 100%;

      opacity: 0;

      transition:
        opacity 1.1s ease;

      background: #000;
      color-scheme: dark;
    }

    body.connected tavus-embed,
    body.opening tavus-embed {
      opacity: 1;
    }

    .entrance {
      position: absolute;
      inset: 49px 0 0 0;

      display: flex;
      align-items: center;
      justify-content: center;

      z-index: 15;

      background:
        radial-gradient(
          circle at center,
          rgba(35, 42, 58, 0.12),
          transparent 36%
        ),
        #050506;

      transition:
        opacity 0.9s ease,
        visibility 0.9s ease;
    }

    body.opening .entrance,
    body.connected .entrance {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .presence {
      text-align: center;
      transform: translateY(-10px);
    }

    .signal {
      margin-bottom: 20px;

      font-size: 9px;
      letter-spacing: 0.28em;
      text-transform: uppercase;

      color: var(--muted);
    }

    h1 {
      margin: 0;

      font-size: clamp(34px, 5vw, 78px);
      font-weight: 400;

      letter-spacing: -0.055em;
      line-height: 0.9;

      color: var(--text);
    }

    .enter {
      appearance: none;

      margin-top: 42px;
      padding: 13px 23px;

      background: transparent;

      border: 1px solid rgba(255, 255, 255, 0.24);

      color: rgba(255, 255, 255, 0.85);

      font: inherit;
      font-size: 10px;
      letter-spacing: 0.22em;
      text-transform: uppercase;

      cursor: pointer;

      transition:
        background 0.3s ease,
        color 0.3s ease,
        border-color 0.3s ease;
    }

    .enter:hover {
      background: rgba(255, 255, 255, 0.94);
      color: #050506;
      border-color: rgba(255, 255, 255, 0.94);
    }

    .enter:disabled {
      opacity: 0.35;
      cursor: wait;
    }

    .corner {
      position: absolute;

      width: 28px;
      height: 28px;

      z-index: 25;

      pointer-events: none;
    }

    .corner.tl {
      top: 11px;
      left: 11px;

      border-top: 1px solid rgba(255, 255, 255, 0.24);
      border-left: 1px solid rgba(255, 255, 255, 0.24);
    }

    .corner.tr {
      top: 11px;
      right: 11px;

      border-top: 1px solid rgba(255, 255, 255, 0.24);
      border-right: 1px solid rgba(255, 255, 255, 0.24);
    }

    .corner.bl {
      bottom: 11px;
      left: 11px;

      border-bottom: 1px solid rgba(255, 255, 255, 0.24);
      border-left: 1px solid rgba(255, 255, 255, 0.24);
    }

    .corner.br {
      bottom: 11px;
      right: 11px;

      border-bottom: 1px solid rgba(255, 255, 255, 0.24);
      border-right: 1px solid rgba(255, 255, 255, 0.24);
    }

    @media (max-width: 700px) {
      .portal {
        width: calc(100vw - 20px);
        height: calc(100vh - 20px);
      }

      .hud {
        padding: 0 12px;
      }

      .hud-right {
        display: none;
      }
    }
  </style>
</head>

<body>

  <main class="portal">

    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>

    <header class="hud">

      <div class="hud-left">
        PV / NINA_FOK
      </div>

      <div class="hud-right status">
        <span class="status-dot"></span>
        <span id="statusText">Berlin / Link standby</span>
      </div>

    </header>

    <section class="viewport">

      <tavus-embed
        id="nina"
        deployment-id="79e246c0-70c7-4c2c-930b-3bf421a01e46">
      </tavus-embed>

    </section>

    <section class="entrance">

      <div class="presence">

        <div class="signal">
          Berlin / Live signal
        </div>

        <h1>Nina FOK</h1>

        <button
          class="enter"
          id="enterButton"
          disabled>
          Connecting
        </button>

      </div>

    </section>

  </main>

  <script src="https://unpkg.com/@tavus/embed@beta"></script>

  <script>
    const nina = document.getElementById("nina");
    const button = document.getElementById("enterButton");
    const statusText = document.getElementById("statusText");

    async function waitForNina() {
      const maxWait = 15000;
      const startTime = Date.now();

      while (!nina.tavus?.start) {
        if (Date.now() - startTime > maxWait) {
          button.textContent = "Retry";
          button.disabled = false;
          statusText.textContent = "Link unavailable";
          return;
        }

        await new Promise(resolve => setTimeout(resolve, 100));
      }

      button.textContent = "Enter";
      button.disabled = false;
      statusText.textContent = "Berlin / Link ready";
    }

    button.addEventListener("click", async () => {
      if (!nina.tavus?.start) {
        await waitForNina();
        return;
      }

      button.disabled = true;
      button.textContent = "Opening";
      statusText.textContent = "Opening channel";

      document.body.classList.add("opening");

      try {
        await nina.tavus.start();
      } catch (error) {
        console.error(error);

        document.body.classList.remove("opening");

        button.disabled = false;
        button.textContent = "Enter";

        statusText.textContent = "Connection failed";
      }
    });

    nina.addEventListener(
      "tavus:conversation-started",
      () => {
        document.body.classList.remove("opening");
        document.body.classList.add("connected");

        statusText.textContent = "Live";
      }
    );

    nina.addEventListener(
      "tavus:conversation-ended",
      () => {
        document.body.classList.remove(
          "opening",
          "connected"
        );

        button.disabled = false;
        button.textContent = "Enter";

        statusText.textContent = "Berlin / Link ready";
      }
    );

    nina.addEventListener(
      "tavus:error",
      (event) => {
        console.error(event.detail);

        document.body.classList.remove(
          "opening",
          "connected"
        );

        button.disabled = false;
        button.textContent = "Retry";

        statusText.textContent = "Signal interrupted";
      }
    );

    waitForNina();
  </script>

</body>
</html>
