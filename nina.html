<!doctype html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0"
>

<title>Nina FOK / Live Signal</title>


<style>

:root {
  --black: #000;
  --near-black: #020203;
  --line: rgba(255, 255, 255, 0.16);
  --line-soft: rgba(255, 255, 255, 0.08);
  --text: rgba(255, 255, 255, 0.88);
  --muted: rgba(255, 255, 255, 0.40);
}


* {
  box-sizing: border-box;
}


html,
body {
  margin: 0;

  width: 100%;
  height: 100%;

  overflow: hidden;

  background: #000;

  color: var(--text);

  font-family:
    "Courier New",
    monospace;
}


body {
  display: flex;

  align-items: center;
  justify-content: center;

  background:
    radial-gradient(
      circle at 50% 45%,
      rgba(32, 40, 58, 0.07),
      transparent 36%
    ),
    #000;
}


/* MAIN FUTURE WINDOW */

.portal {
  position: relative;

  width: calc(100vw - 28px);
  height: calc(100vh - 28px);

  overflow: hidden;

  background: var(--near-black);

  border:
    1px solid var(--line);

  box-shadow:
    0 35px 150px rgba(0, 0, 0, 0.95);
}


/* TOP SIGNAL BAR */

.topbar {
  position: absolute;

  top: 0;
  left: 0;
  right: 0;

  height: 42px;

  z-index: 100;

  display: flex;

  align-items: center;
  justify-content: space-between;

  padding:
    0
    13px;

  background:
    rgba(1, 1, 2, 0.98);

  border-bottom:
    1px solid var(--line-soft);

  font-size: 9px;

  letter-spacing: 0.18em;

  text-transform: uppercase;

  color:
    rgba(255, 255, 255, 0.45);
}


.identity {
  color:
    rgba(255, 255, 255, 0.74);
}


.status {
  display: flex;

  align-items: center;

  gap: 9px;
}


.status-dot {
  width: 4px;
  height: 4px;

  border-radius: 50%;

  background:
    rgba(255, 255, 255, 0.86);

  box-shadow:
    0 0 8px
    rgba(255, 255, 255, 0.55);
}


/* TAVUS LIVE AREA */

.viewport {
  position: absolute;

  top: 43px;
  left: 0;
  right: 0;
  bottom: 0;

  overflow: hidden;

  background: #000;
}


tavus-embed {
  position: absolute;

  inset: 0;

  display: block;

  width: 100%;
  height: 100%;

  opacity: 0;

  pointer-events: none;

  background: #000;

  transition:
    opacity 1s ease;
}


body.live tavus-embed {
  opacity: 1;

  pointer-events: auto;
}


/* BLACK COVER HIDES ALL DEFAULT TAVUS SCREENS */

.cover {
  position: absolute;

  top: 43px;
  left: 0;
  right: 0;
  bottom: 0;

  z-index: 50;

  display: flex;

  align-items: center;
  justify-content: center;

  background:
    radial-gradient(
      circle at center,
      rgba(30, 38, 56, 0.07),
      transparent 30%
    ),
    #020203;

  opacity: 1;

  pointer-events: auto;

  transition:
    opacity 1.2s ease;
}


body.reveal .cover {
  opacity: 0;

  pointer-events: none;
}


/* CENTER SIGNAL */

.entry {
  position: relative;

  display: flex;

  flex-direction: column;

  align-items: center;

  transform:
    translateY(-8px);
}


.signal-code {
  margin-bottom: 26px;

  font-size: 8px;

  letter-spacing: 0.30em;

  text-transform: uppercase;

  color: var(--muted);
}


.name {
  margin-bottom: 35px;

  font-size: 11px;

  letter-spacing: 0.34em;

  text-transform: uppercase;

  color:
    rgba(255, 255, 255, 0.72);
}


/* APERTURE */

.aperture {
  position: relative;

  width: 1px;
  height: 82px;

  margin-bottom: 37px;

  background:
    rgba(255, 255, 255, 0.30);

  box-shadow:
    0 0 18px
    rgba(175, 195, 255, 0.10);

  transition:
    height 1.9s
    cubic-bezier(.16, 1, .3, 1),

    box-shadow 1.9s ease;
}


.aperture::after {
  content: "";

  position: absolute;

  top: 50%;
  left: 50%;

  width: 2px;
  height: 2px;

  transform:
    translate(-50%, -50%);

  background: white;

  box-shadow:
    0 0 14px
    rgba(255, 255, 255, 0.75);
}


body.opening .aperture {
  height: 210px;

  box-shadow:
    0 0 35px
    rgba(170, 195, 255, 0.16);
}


/* CONNECT BUTTON */

.connect {
  appearance: none;

  padding:
    12px
    19px;

  border:
    1px solid
    rgba(255, 255, 255, 0.22);

  background: transparent;

  color:
    rgba(255, 255, 255, 0.80);

  font-family:
    "Courier New",
    monospace;

  font-size: 9px;

  letter-spacing: 0.24em;

  text-transform: uppercase;

  cursor: pointer;

  transition:
    background 0.25s ease,
    color 0.25s ease,
    border-color 0.25s ease,
    opacity 0.4s ease;
}


.connect:hover {
  background:
    rgba(255, 255, 255, 0.94);

  color: #000;

  border-color:
    rgba(255, 255, 255, 0.94);
}


.connect:disabled {
  cursor: default;

  opacity: 0.25;
}


body.opening .connect {
  opacity: 0;

  pointer-events: none;
}


/* OPENING LABEL */

.opening-label {
  position: absolute;

  top: calc(100% + 22px);

  opacity: 0;

  font-size: 8px;

  letter-spacing: 0.25em;

  text-transform: uppercase;

  color:
    rgba(255, 255, 255, 0.34);

  transition:
    opacity 0.6s ease 0.35s;
}


body.opening .opening-label {
  opacity: 1;
}


/* CORNERS */

.corner {
  position: absolute;

  z-index: 120;

  width: 25px;
  height: 25px;

  pointer-events: none;
}


.corner-tl {
  top: 10px;
  left: 10px;

  border-top:
    1px solid
    rgba(255, 255, 255, 0.24);

  border-left:
    1px solid
    rgba(255, 255, 255, 0.24);
}


.corner-tr {
  top: 10px;
  right: 10px;

  border-top:
    1px solid
    rgba(255, 255, 255, 0.24);

  border-right:
    1px solid
    rgba(255, 255, 255, 0.24);
}


.corner-bl {
  bottom: 10px;
  left: 10px;

  border-bottom:
    1px solid
    rgba(255, 255, 255, 0.24);

  border-left:
    1px solid
    rgba(255, 255, 255, 0.24);
}


.corner-br {
  bottom: 10px;
  right: 10px;

  border-bottom:
    1px solid
    rgba(255, 255, 255, 0.24);

  border-right:
    1px solid
    rgba(255, 255, 255, 0.24);
}


/* MOBILE */

@media (max-width: 700px) {

  .portal {
    width:
      calc(100vw - 8px);

    height:
      calc(100vh - 8px);
  }


  .topbar {
    padding:
      0
      10px;
  }


  .identity {
    font-size: 8px;
  }


  .status {
    font-size: 8px;
  }

}

</style>

</head>


<body>


<main class="portal">


  <div class="corner corner-tl"></div>

  <div class="corner corner-tr"></div>

  <div class="corner corner-bl"></div>

  <div class="corner corner-br"></div>



  <header class="topbar">


    <div class="identity">

      PV / NINA_FOK

    </div>


    <div class="status">

      <span class="status-dot"></span>

      <span id="statusText">

        Link standby

      </span>

    </div>


  </header>



  <section class="viewport">


    <tavus-embed
      id="nina"
      deployment-id="79e246c0-70c7-4c2c-930b-3bf421a01e46">
    </tavus-embed>


  </section>



  <section class="cover">


    <div class="entry">


      <div class="signal-code">

        Berlin / 2063

      </div>


      <div class="name">

        Nina FOK

      </div>


      <div class="aperture"></div>


      <button
        id="connectButton"
        class="connect"
        type="button"
        disabled>

        Initializing

      </button>


      <div class="opening-label">

        Opening channel

      </div>


    </div>


  </section>


</main>



<script src="https://unpkg.com/@tavus/embed"></script>


<script>

const nina =
  document.getElementById(
    "nina"
  );


const connectButton =
  document.getElementById(
    "connectButton"
  );


const statusText =
  document.getElementById(
    "statusText"
  );


let revealed = false;



function resetInterface() {

  revealed = false;

  document.body.classList.remove(
    "opening",
    "live",
    "reveal"
  );

  connectButton.disabled = false;

  connectButton.textContent =
    "Connect";

  statusText.textContent =
    "Link ready";

}



function revealNina() {

  if (revealed) {
    return;
  }

  revealed = true;

  document.body.classList.add(
    "live"
  );

  statusText.textContent =
    "Live signal";

  setTimeout(
    () => {

      document.body.classList.add(
        "reveal"
      );

    },
    650
  );

}



async function waitForTavus() {

  const started =
    Date.now();


  while (
    !nina.tavus ||
    typeof nina.tavus.start
      !== "function"
  ) {

    if (
      Date.now() - started
      > 15000
    ) {

      connectButton.disabled =
        false;

      connectButton.textContent =
        "Retry";

      statusText.textContent =
        "Link unavailable";

      return;

    }


    await new Promise(
      resolve =>
        setTimeout(
          resolve,
          100
        )
    );

  }


  connectButton.disabled =
    false;

  connectButton.textContent =
    "Connect";

  statusText.textContent =
    "Link ready";

}



connectButton.addEventListener(
  "click",

  async () => {


    if (
      !nina.tavus ||
      typeof nina.tavus.start
        !== "function"
    ) {

      await waitForTavus();

      return;

    }


    connectButton.disabled =
      true;


    document.body.classList.add(
      "opening"
    );


    statusText.textContent =
      "Opening channel";


    try {

      await nina.tavus.start();

    }

    catch (error) {

      console.error(
        error
      );

      document.body.classList.remove(
        "opening"
      );

      connectButton.disabled =
        false;

      connectButton.textContent =
        "Retry";

      statusText.textContent =
        "Connection failed";

    }

  }
);



nina.addEventListener(
  "tavus:conversation-started",

  () => {

    revealNina();

  }
);



nina.addEventListener(
  "tavus:state-change",

  event => {

    const state =
      event.detail?.state;


    if (
      state === "connected"
    ) {

      revealNina();

    }


    if (
      state === "ended"
    ) {

      resetInterface();

    }

  }
);



nina.addEventListener(
  "tavus:conversation-ended",

  () => {

    resetInterface();

  }
);



nina.addEventListener(
  "tavus:error",

  event => {

    console.error(
      event.detail
    );


    document.body.classList.remove(
      "opening",
      "live",
      "reveal"
    );


    connectButton.disabled =
      false;


    connectButton.textContent =
      "Retry";


    statusText.textContent =
      "Signal interrupted";

  }
);



waitForTavus();

</script>


</body>

</html>
