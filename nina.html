<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Nina FOK</title>

  <style>
    :root {
      --black: #020203;
      --line: rgba(255, 255, 255, 0.16);
      --soft: rgba(255, 255, 255, 0.42);
      --text: rgba(255, 255, 255, 0.88);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;

      font-family:
        "Helvetica Neue",
        Helvetica,
        Arial,
        sans-serif;

      color: var(--text);

      background:
        radial-gradient(
          circle at 50% 45%,
          rgba(35, 42, 60, 0.08),
          transparent 34%
        ),
        #000;
    }

    .portal {
      position: relative;

      width: calc(100vw - 60px);
      height: calc(100vh - 60px);

      max-width: 1800px;

      overflow: hidden;

      background: var(--black);

      border: 1px solid var(--line);

      box-shadow:
        0 40px 160px rgba(0, 0, 0, 0.9);
    }

    .topbar {
      position: absolute;

      top: 0;
      left: 0;
      right: 0;

      height: 44px;

      z-index: 100;

      display: flex;
      align-items: center;
      justify-content: space-between;

      padding: 0 13px;

      background: rgba(2, 2, 3, 0.98);

      border-bottom:
        1px solid rgba(255, 255, 255, 0.09);

      font-family:
        "Courier New",
        monospace;

      font-size: 9px;

      letter-spacing: 0.16em;

      text-transform: uppercase;

      color: rgba(255, 255, 255, 0.52);
    }

    .identity {
      color: rgba(255, 255, 255, 0.78);
    }

    .status {
      display: flex;
      align-items: center;
      gap: 9px;
    }

    .dot {
      width: 4px;
      height: 4px;

      border-radius: 50%;

      background: rgba(255, 255, 255, 0.75);

      box-shadow:
        0 0 7px rgba(255, 255, 255, 0.45);
    }

    .viewport {
      position: absolute;

      top: 45px;
      left: 0;
      right: 0;
      bottom: 0;

      overflow: hidden;

      background: #000;
    }

    tavus-embed {
      position: absolute;

      inset: 0;

      width: 100%;
      height: 100%;

      opacity: 0;
      visibility: hidden;

      background: #000;

      transition:
        opacity 0.9s ease;
    }

    body.live tavus-embed {
      opacity: 1;
      visibility: visible;
    }

    .cover {
      position: absolute;

      top: 45px;
      left: 0;
      right: 0;
      bottom: 0;

      z-index: 50;

      display: flex;
      align-items: center;
      justify-content: center;

      background: #020203;

      opacity: 1;
      visibility: visible;

      transition:
        opacity 1s ease,
        visibility 1s ease;
    }

    body.reveal .cover {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .entry {
      display: flex;
      flex-direction: column;
      align-items: center;

      transform: translateY(-10px);
    }

    .name {
      margin-bottom: 31px;

      font-family:
        "Courier New",
        monospace;

      font-size: 10px;

      letter-spacing: 0.27em;

      text-transform: uppercase;

      color: rgba(255, 255, 255, 0.66);
    }

    .aperture {
      position: relative;

      width: 1px;
      height: 76px;

      margin-bottom: 34px;

      background:
        rgba(255, 255, 255, 0.32);

      box-shadow:
        0 0 16px rgba(180, 200, 255, 0.08);

      transition:
        height 1.8s cubic-bezier(.16, 1, .3, 1),
        box-shadow 1.8s ease;
    }

    .aperture::after {
      content: "";

      position: absolute;

      top: 50%;
      left: 50%;

      width: 1px;
      height: 1px;

      transform: translate(-50%, -50%);

      background: white;

      box-shadow:
        0 0 12px rgba(255, 255, 255, 0.65);
    }

    body.opening .aperture {
      height: 190px;

      box-shadow:
        0 0 28px rgba(175, 195, 255, 0.15);
    }

    .enter {
      appearance: none;

      padding: 11px 17px;

      border:
        1px solid rgba(255, 255, 255, 0.20);

      background: transparent;

      color: rgba(255, 255, 255, 0.78);

      font-family:
        "Courier New",
        monospace;

      font-size: 9px;

      letter-spacing: 0.22em;

      text-transform: uppercase;

      cursor: pointer;

      transition:
        background 0.25s ease,
        color 0.25s ease,
        opacity 0.25s ease;
    }

    .enter:hover {
      background: rgba(255, 255, 255, 0.92);
      color: #000;
    }

    .enter:disabled {
      opacity: 0.25;
      cursor: default;
    }

    body.opening .enter {
      opacity: 0;
      pointer-events: none;
    }

    .opening-label {
      position: absolute;

      margin-top: 160px;

      opacity: 0;

      font-family:
        "Courier New",
        monospace;

      font-size: 8px;

      letter-spacing: 0.24em;

      text-transform: uppercase;

      color: rgba(255, 255, 255, 0.34);

      transition:
        opacity 0.7s ease 0.4s;
    }

    body.opening .opening-label {
      opacity: 1;
    }

    .corner {
      position: absolute;

      z-index: 120;

      width: 24px;
      height: 24px;

      pointer-events: none;
    }

    .tl {
      top: 10px;
      left: 10px;

      border-top:
        1px solid rgba(255, 255, 255, 0.25);

      border-left:
        1px solid rgba(255, 255, 255, 0.25);
    }

    .tr {
      top: 10px;
      right: 10px;

      border-top:
        1px solid rgba(255, 255, 255, 0.25);

      border-right:
        1px solid rgba(255, 255, 255, 0.25);
    }

    .bl {
      bottom: 10px;
      left: 10px;

      border-bottom:
        1px solid rgba(255, 255, 255, 0.25);

      border-left:
        1px solid rgba(255, 255, 255, 0.25);
    }

    .br {
      bottom: 10px;
      right: 10px;

      border-bottom:
        1px solid rgba(255, 255, 255, 0.25);

      border-right:
        1px solid rgba(255, 255, 255, 0.25);
    }

    @media (max-width: 700px) {
      .portal {
        width: calc(100vw - 14px);
        height: calc(100vh - 14px);
      }
    }
  </style>
</head>

<body>

  <main class="portal">

    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>

    <header class="topbar">

      <div class="identity">
        PV / NINA_FOK
      </div>

      <div class="status">
        <span class="dot"></span>
        <span id="statusText">
          Link ready
        </span>
      </div>

    </header>

    <section class="viewport">

      <tavus-embed
        id="nina"
        deployment-id="79e246c0-70c7-4c2c-930b-3bf421a01e46">
      </tavus-embed>

    </section>

    <section class="cover">

      <div class="entry">

        <div class="name">
          Nina FOK
        </div>

        <div class="aperture"></div>

        <button
          id="enterButton"
          class="enter"
          disabled>
          Connect
        </button>

        <div class="opening-label">
          Opening channel
        </div>

      </div>

    </section>

  </main>

  <script src="https://unpkg.com/@tavus/embed@beta"></script>

  <script>
    const nina =
      document.getElementById("nina");

    const button =
      document.getElementById("enterButton");

    const statusText =
      document.getElementById("statusText");

    async function waitForTavus() {

      const startTime = Date.now();

      while (!nina.tavus?.start) {

        if (Date.now() - startTime > 15000) {

          button.disabled = false;

          button.textContent = "Retry";

          statusText.textContent =
            "Link unavailable";

          return;
        }

        await new Promise(
          resolve => setTimeout(resolve, 100)
        );
      }

      button.disabled = false;

      button.textContent = "Connect";

      statusText.textContent =
        "Link ready";
    }

    button.addEventListener(
      "click",
      async () => {

        if (!nina.tavus?.start) {
          return;
        }

        button.disabled = true;

        document.body.classList.add(
          "opening"
        );

        statusText.textContent =
          "Opening channel";

        try {

          await nina.tavus.start();

        } catch (error) {

          console.error(error);

          document.body.classList.remove(
            "opening"
          );

          button.disabled = false;

          button.textContent = "Retry";

          statusText.textContent =
            "Connection failed";
        }
      }
    );

    nina.addEventListener(
      "tavus:conversation-started",
      () => {

        statusText.textContent =
          "Live";

        document.body.classList.add(
          "live"
        );

        setTimeout(() => {

          document.body.classList.add(
            "reveal"
          );

        }, 700);
      }
    );

    nina.addEventListener(
      "tavus:conversation-ended",
      () => {

        document.body.classList.remove(
          "opening",
          "live",
          "reveal"
        );

        button.disabled = false;

        button.textContent =
          "Connect";

        statusText.textContent =
          "Link ready";
      }
    );

    nina.addEventListener(
      "tavus:error",
      event => {

        console.error(
          event.detail
        );

        document.body.classList.remove(
          "opening",
          "live",
          "reveal"
        );

        button.disabled = false;

        button.textContent =
          "Retry";

        statusText.textContent =
          "Signal interrupted";
      }
    );

    waitForTavus();
  </script>

</body>
</html>
